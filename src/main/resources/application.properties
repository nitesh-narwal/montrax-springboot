spring.application.name=moneymanager

# ===============================
# SERVER
# ===============================
server.port=8090

# Tomcat thread optimization for low memory server
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:10}
server.tomcat.threads.min-spare=2

# ===============================
# DATASOURCE (PostgreSQL / Neon)
# ===============================
spring.datasource.url=${DB_URI}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# CONNECTION POOL (HikariCP) - Optimized for low memory
# ===============================
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# MAILJET SMTP CONFIGURATION
# ===============================

spring.mail.host=in-v3.mailjet.com
spring.mail.port=587

# Mailjet SMTP credentials
spring.mail.username=${MAILJET_API_KEY}
spring.mail.password=${MAILJET_SECRET_KEY}

# ===============================
# SMTP PROPERTIES
# ===============================

spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.from=${MAILJET_MAIL_FROM}

# ===============================
# DEBUG (configurable via env)
# ===============================
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# ===============================
# LOGGING CONFIGURATION
# Optimized to reduce startup noise
# ===============================
logging.level.root=WARN
logging.level.org.springframework=${SPRING_LOG_LEVEL:WARN}
logging.level.org.springframework.web=${LOG_LEVEL:WARN}
logging.level.org.springframework.boot=${SPRING_BOOT_LOG_LEVEL:WARN}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
logging.level.org.hibernate=${HIBERNATE_LOG_LEVEL:WARN}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.com.zaxxer.hikari=${HIKARI_LOG_LEVEL:WARN}
logging.level.org.mongodb.driver=${MONGO_LOG_LEVEL:WARN}
logging.level.io.lettuce=${REDIS_LOG_LEVEL:WARN}
logging.level.org.apache.tomcat=${TOMCAT_LOG_LEVEL:WARN}
logging.level.org.apache.catalina=${CATALINA_LOG_LEVEL:WARN}
logging.level.in.tracking.moneymanager=${APP_LOG_LEVEL:INFO}

# Suppress noisy framework startup logs
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.context.annotation=WARN
logging.level.org.springframework.beans.factory=WARN
logging.level.org.springframework.core.env=WARN


jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000  

money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:5173}

# ===============================
# RAZORPAY CONFIGURATION
# ===============================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_dummy}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_secret}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:dummy_webhook}

# ===============================
# GOOGLE GEMINI AI
# Current model (March 2026): gemini-2.5-flash
# Free tier: 15 RPM, 250 RPD
# Get API key from: https://aistudio.google.com/app/apikey
# ===============================
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# ===============================
# MONGODB CONFIGURATION
# Set MONGODB_URI to enable AI features
# Example: mongodb+srv://user:pass@cluster.mongodb.net/dbname
# Leave MONGODB_URI empty or unset to disable AI history persistence
# MongoDB auto-config is excluded by default and re-enabled when URI is set
# ===============================
spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.database=${MONGODB_DATABASE:montrax}
spring.data.mongodb.auto-index-creation=true


# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

# ===============================
# CACHE CONFIGURATION
# Use 'redis' for production, 'simple' for development without Redis
# ===============================
spring.cache.type=${CACHE_TYPE}

# ===============================
# FILE UPLOAD LIMITS
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.activation.url=${APP_ACTIVATION_URL:http://localhost:8090}

# ===============================
# CLOUDINARY CONFIGURATION
# Get credentials from: https://cloudinary.com/console
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===============================
# ACTUATOR (Health checks for Docker)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Disable MongoDB and Redis health indicators completely
# MongoDB is optional and used only for AI features
management.health.mongo.enabled=false
management.health.redis.enabled=false
management.health.defaults.enabled=true

# Exclude MongoDB from health check contributors
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db
